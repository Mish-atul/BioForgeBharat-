services:
  - type: web
    name: bioforgebharat-api
    env: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@10.24.0 --activate && NODE_OPTIONS=--max-old-space-size=4096 pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: bioforgebharat-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: bioforgebharat-db
    plan: free
