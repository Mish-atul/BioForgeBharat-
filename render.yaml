services:
  - type: web
    name: bioforgebharat-api
    env: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: bioforgebharat-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: bioforgebharat-db
    plan: free
