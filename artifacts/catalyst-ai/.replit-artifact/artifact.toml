kind = "web"
previewPath = "/"
title = "BioForgeBharat — Agentic Molecular Discovery"
version = "1.0.0"
id = "artifacts/catalyst-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22573

[services.development]
run = "pnpm --filter @workspace/catalyst-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/catalyst-ai", "run", "build" ]
publicDir = "artifacts/catalyst-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22573"
BASE_PATH = "/"
